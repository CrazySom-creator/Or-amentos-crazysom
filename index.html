<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Teste Login</title>
<style>
body{font-family:Arial,sans-serif;background:#181818;padding:20px;color:#fff}
.box{background:#1c1c1c;padding:24px;border-radius:10px;max-width:400px;margin:0 auto 20px}
h2{margin-bottom:16px;color:#fff}
label{font-size:11px;color:#aaa;display:block;margin-bottom:4px;text-transform:uppercase}
input{width:100%;padding:10px;border:1px solid #333;border-radius:5px;background:#111;color:#fff;font-size:14px;margin-bottom:12px}
input:focus{outline:none;border-color:#c0001a}
button{width:100%;padding:11px;background:#c0001a;color:#fff;border:none;border-radius:5px;font-size:14px;font-weight:800;cursor:pointer}
.err{color:#ff5555;font-size:13px;font-weight:700;min-height:20px;margin-bottom:10px;text-align:center}
.ok{color:#66bb6a;font-size:13px;font-weight:700;text-align:center;margin-top:10px}
/* APROVAÇÃO */
.aprov{background:#fff;padding:16px;border-radius:8px;margin-top:16px}
.aprov h3{font-size:13px;font-weight:800;margin-bottom:12px;color:#111}
.st-bar{display:flex;align-items:center;gap:10px;padding:9px 14px;border-radius:6px;margin-bottom:12px;font-size:12px;font-weight:700}
.dot{width:11px;height:11px;border-radius:50%;flex-shrink:0}
.btns{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.abtn{padding:8px 15px;border:none;border-radius:5px;cursor:pointer;font-size:12px;font-weight:700;color:#fff}
.obs{width:100%;padding:7px 10px;border:1px solid #ddd;border-radius:4px;font-size:12px;resize:none;height:40px;margin-top:8px;background:#fff;color:#222}
.hist{background:#f5f5f5;border-radius:6px;padding:10px 14px;margin-top:10px;font-size:11px;color:#333}
.hist h4{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:#555;margin-bottom:8px}
.evt{padding:4px 0;border-bottom:1px solid #eee;font-size:11px}
.evt:last-child{border-bottom:none}
.log-info{background:#1c1c1c;padding:12px 16px;border-radius:8px;margin-top:16px;font-size:12px}
</style>
</head>
<body>

<div class="box">
  <h2>🔐 Teste de Login</h2>
  <label>Usuário</label>
  <input type="text" id="l-user" placeholder="fabiano.santos" onkeydown="if(event.key==='Enter')document.getElementById('l-pass').focus()">
  <label>Senha</label>
  <input type="password" id="l-pass" placeholder="crazy@2026" onkeydown="if(event.key==='Enter')doLogin()">
  <div class="err" id="l-err"></div>
  <button onclick="doLogin()">Entrar →</button>
  <div class="ok" id="l-ok"></div>
</div>

<div id="aprov-section" style="display:none;max-width:400px;margin:0 auto">
  <div class="aprov">
    <h3>✅ Status & Aprovação</h3>
    <div id="aprov-sb"></div>
    <div id="aprov-aw"></div>
    <div id="aprov-hist" style="display:none" class="hist">
      <h4>📜 Histórico</h4>
      <div id="aprov-hl"></div>
    </div>
  </div>
  <div class="log-info" id="log-info"></div>
</div>

<script>
// Hash simples
function hs(s){
  let h=0;
  for(let i=0;i<s.length;i++){h=((h<<5)-h)+s.charCodeAt(i);h|=0;}
  return String(h);
}

// Teste do hash
console.log('Hash de crazy@2026:', hs('crazy@2026'));

const USUARIOS=[
  {id:'fabiano.santos',    nome:'Fabiano Santos',    nivel:'adm',       senha:hs('crazy@2026')},
  {id:'giovana.borges',    nome:'Giovana Borges',    nivel:'consultor', senha:hs('crazy@2026')},
  {id:'jessica.elisandra', nome:'Jéssica Elisandra', nivel:'consultor', senha:hs('crazy@2026')},
  {id:'rafael.oliveira',   nome:'Rafael Oliveira',   nivel:'consultor', senha:hs('crazy@2026')},
  {id:'jefferson',         nome:'Jefferson',         nivel:'consultor', senha:hs('crazy@2026')},
  {id:'wagner.wolff',      nome:'Wagner Wolff',      nivel:'consultor', senha:hs('crazy@2026')},
  {id:'tec1',              nome:'Técnico 1',         nivel:'tecnico',   senha:hs('crazy@2026')},
  {id:'tec2',              nome:'Técnico 2',         nivel:'tecnico',   senha:hs('crazy@2026')},
  {id:'gerente',           nome:'Gerente Comercial', nivel:'gerente',   senha:hs('crazy@2026')},
  {id:'diretor',           nome:'Diretor Comercial', nivel:'diretor',   senha:hs('crazy@2026')},
];

const NIVEIS={adm:'Administrador',consultor:'Consultor',tecnico:'Área Técnica',gerente:'Gerente Comercial',diretor:'Diretor Comercial'};

const STATUS_INFO={
  rascunho: {label:'🟡 Rascunho',           bg:'#fff8e1',bd:'#ffe082',tx:'#7a5a00',dot:'#f9a825'},
  analise:  {label:'🔵 Em Análise Técnica',  bg:'#e3f2fd',bd:'#90caf9',tx:'#1565c0',dot:'#1565c0'},
  gerencial:{label:'🟠 Aprovação Gerencial', bg:'#fff3e0',bd:'#ffb74d',tx:'#e65100',dot:'#e65100'},
  diretoria:{label:'🟣 Aprovação Diretoria', bg:'#f3e5f5',bd:'#ce93d8',tx:'#6a1b9a',dot:'#6a1b9a'},
  aprovado: {label:'🟢 Aprovado',            bg:'#e8f5e9',bd:'#a5d6a7',tx:'#1b5e20',dot:'#2e7d32'},
  revisao:  {label:'🔴 Revisão Solicitada',  bg:'#ffebee',bd:'#ef9a9a',tx:'#b71c1c',dot:'#c62828'},
};

const LIMITE=4000;
let usuarioAtual=null;
let aprovStatus='rascunho';
let aprovHist=[];

function doLogin(){
  const uid=(document.getElementById('l-user').value||'').trim().toLowerCase();
  const pwd=document.getElementById('l-pass').value||'';
  const err=document.getElementById('l-err');
  const ok=document.getElementById('l-ok');

  err.textContent='';
  ok.textContent='';

  if(!uid){err.textContent='⚠️ Digite seu usuário.';return;}
  if(!pwd){err.textContent='⚠️ Digite sua senha.';return;}

  const u=USUARIOS.find(x=>x.id===uid);
  if(!u){
    err.textContent='❌ Usuário "'+uid+'" não encontrado.';
    document.getElementById('l-pass').value='';
    return;
  }

  const hashDigitado=hs(pwd);
  console.log('Hash digitado:', hashDigitado, '| Hash salvo:', u.senha, '| Match:', hashDigitado===u.senha);

  if(hashDigitado!==u.senha){
    err.textContent='❌ Senha incorreta.';
    document.getElementById('l-pass').value='';
    document.getElementById('l-pass').focus();
    return;
  }

  usuarioAtual=u;
  aprovStatus='rascunho';
  aprovHist=[];

  ok.textContent='✅ Login OK: '+u.nome+' ('+NIVEIS[u.nivel]+')';
  document.getElementById('aprov-section').style.display='block';
  document.getElementById('log-info').innerHTML='<b style="color:#90caf9">Usuário:</b> '+u.nome+'<br><b style="color:#90caf9">Nível:</b> '+NIVEIS[u.nivel]+'<br><b style="color:#90caf9">Hash:</b> '+u.senha;

  renderAprov();
}

function renderAprov(){
  const sb=document.getElementById('aprov-sb');
  const aw=document.getElementById('aprov-aw');
  const ah=document.getElementById('aprov-hist');
  const hl=document.getElementById('aprov-hl');

  if(!sb||!aw){console.error('Elementos não encontrados!');return;}

  const si=STATUS_INFO[aprovStatus]||STATUS_INFO.rascunho;

  // Barra de status
  sb.innerHTML='<div class="st-bar" style="background:'+si.bg+';border:1px solid '+si.bd+';color:'+si.tx+'"><div class="dot" style="background:'+si.dot+'"></div><span>'+si.label+'</span></div>';

  // Histórico
  if(aprovHist.length){
    ah.style.display='block';
    hl.innerHTML=aprovHist.map(h=>'<div class="evt"><b>'+h.acao+'</b> — '+h.usuario+' ('+h.cargo+')<br><small style="color:#888">'+h.data+(h.obs?' · '+h.obs:'')+'</small></div>').join('');
  } else {
    ah.style.display='none';
  }

  if(!usuarioAtual){
    aw.innerHTML='<p style="color:#888;font-size:12px">Faça login para ver as ações.</p>';
    return;
  }

  const nivel=usuarioAtual.nivel==='adm'?'consultor':usuarioAtual.nivel;
  const b=(cor,txt,fn)=>'<button class="abtn" onclick="'+fn+'" style="background:'+cor+'">'+txt+'</button>';
  const obs='<textarea class="obs" id="aprov-obs" placeholder="Observação (opcional)..."></textarea>';
  let acoes='';

  if(nivel==='consultor'&&aprovStatus==='rascunho'){
    acoes=obs+'<div class="btns">'+b('#1565c0',"📤 Enviar para Análise Técnica","aprovAcao('analise')")+'</div>';
  } else if(nivel==='consultor'&&aprovStatus==='revisao'){
    acoes=obs+'<div class="btns">'+b('#1565c0',"📤 Reenviar para Análise Técnica","aprovAcao('analise')")+'</div>';
  } else if(nivel==='tecnico'&&aprovStatus==='analise'){
    acoes=obs+'<div class="btns">'+b('#2e7d32',"✅ Aprovar","aprovAcao('aprovado')")+b('#c62828',"🔄 Revisão","aprovAcao('revisao')")+'</div>';
  } else if(nivel==='gerente'&&aprovStatus==='gerencial'){
    acoes=obs+'<div class="btns">'+b('#2e7d32',"✅ Aprovar","aprovAcao('aprovado')")+b('#6a1b9a',"🏆 Diretoria","aprovAcao('diretoria')")+b('#c62828',"🔄 Revisão","aprovAcao('revisao')")+'</div>';
  } else if(nivel==='diretor'&&aprovStatus==='diretoria'){
    acoes=obs+'<div class="btns">'+b('#2e7d32',"✅ Aprovar","aprovAcao('aprovado')")+b('#c62828',"🔄 Reprovar","aprovAcao('revisao')")+'</div>';
  } else {
    const msgs={rascunho:'Aguardando envio pelo consultor.',analise:'Aguardando análise técnica.',gerencial:'Aguardando aprovação do gerente.',diretoria:'Aguardando aprovação da diretoria.',aprovado:'✅ Aprovado! Pode gerar o PDF.',revisao:'🔄 Aguardando correção do consultor.'};
    acoes='<p style="color:#888;font-size:12px;padding:6px 0">'+(msgs[aprovStatus]||'')+'</p>';
  }
  aw.innerHTML=acoes;
}

function aprovAcao(novo){
  const obs=(document.getElementById('aprov-obs')||{}).value||'';
  const atos={analise:'Enviado p/ Análise',gerencial:'Encaminhado ao Gerente',diretoria:'Encaminhado à Diretoria',aprovado:'Aprovado',revisao:'Revisão Solicitada'};
  aprovHist.push({acao:atos[novo]||novo,usuario:usuarioAtual.nome,cargo:NIVEIS[usuarioAtual.nivel],data:new Date().toLocaleString('pt-BR'),obs});
  aprovStatus=novo;
  renderAprov();
}

// Teste automático do hash no console
window.onload=function(){
  console.log('=== TESTE DE HASH ===');
  console.log('hs("crazy@2026") =', hs('crazy@2026'));
  console.log('USUARIOS[0].senha =', USUARIOS[0].senha);
  console.log('Match:', hs('crazy@2026')===USUARIOS[0].senha);
};
</script>
</body>
</html>
